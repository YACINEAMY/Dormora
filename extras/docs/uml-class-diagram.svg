<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1280" viewBox="0 0 1600 1280">
<defs><style>.title{font:700 30px Arial,sans-serif;fill:#13231d}.subtitle{font:14px Arial,sans-serif;fill:#475467}.box{fill:#f7faf8;stroke:#1d7a57;stroke-width:2;rx:10}.header{fill:#e6f4ee;stroke:#1d7a57;stroke-width:2}.name{font:700 18px Arial,sans-serif;fill:#13231d}.text{font:14px Consolas,monospace;fill:#13231d}.note{font:13px Arial,sans-serif;fill:#475467}.line{stroke:#13231d;stroke-width:2.2;fill:none}.dash{stroke:#667085;stroke-width:2.2;stroke-dasharray:8 6;fill:none}.sep{stroke:#cbd8d2;stroke-width:1}</style><marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto"><path d="M 1 1 L 11 6 L 1 11" class="line"/></marker><marker id="inherit" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto"><path d="M 13 7 L 1 1 L 1 13 Z" fill="#f7faf8" stroke="#13231d" stroke-width="2"/></marker><marker id="diamond" markerWidth="16" markerHeight="12" refX="1" refY="6" orient="auto"><path d="M 1 6 L 8 1 L 15 6 L 8 11 Z" fill="#13231d" stroke="#13231d"/></marker><marker id="hollowDiamond" markerWidth="16" markerHeight="12" refX="1" refY="6" orient="auto"><path d="M 1 6 L 8 1 L 15 6 L 8 11 Z" fill="#f7faf8" stroke="#13231d" stroke-width="1.8"/></marker></defs>
<text x="60" y="48" class="title">Dormora UML Class Diagram</text>
<text x="60" y="76" class="subtitle">University Dormitory &amp; Restaurant Management System - class structure, composition, associations, and persistence helpers</text>
<path d="M 270 430 L 245 325" class="line" marker-end="url(#inherit)"/>
<text x="180" y="370" class="note">inherits</text>
<path d="M 775 455 L 775 350" class="line" marker-start="url(#diamond)" marker-end="url(#arrow)"/>
<text x="700" y="400" class="note">owns rooms</text>
<path d="M 1000 610 L 1045 610 L 1045 230 L 1090 230" class="line" marker-start="url(#diamond)" marker-end="url(#arrow)"/>
<text x="1012" y="392" class="note">owns one restaurant</text>
<path d="M 1300 345 L 1310 455" class="line" marker-start="url(#diamond)" marker-end="url(#arrow)"/>
<text x="1235" y="400" class="note">dated menus</text>
<path d="M 520 1025 L 485 1025 L 485 548 L 470 547" class="line" marker-start="url(#hollowDiamond)" marker-end="url(#arrow)"/>
<text x="335" y="770" class="note">manages students</text>
<path d="M 785 875 L 775 765" class="line" marker-start="url(#hollowDiamond)" marker-end="url(#arrow)"/>
<text x="700" y="825" class="note">manages dormitories</text>
<path d="M 1170 912 L 1050 1025" class="dash" marker-end="url(#arrow)"/>
<text x="1082" y="905" class="note">save / load</text>
<path d="M 1170 1127 L 1090 1127 L 1090 1025 L 1050 1025" class="dash" marker-end="url(#arrow)"/>
<text x="1050" y="1080" class="note">GUI persistence</text>
<path d="M 400 940 L 520 1025" class="dash" marker-end="url(#arrow)"/>
<text x="235" y="835" class="note">validation errors</text>
<path d="M 400 940 L 475 940 L 475 610 L 550 610" class="dash" marker-end="url(#arrow)"/>
<path d="M 400 940 L 505 940 L 505 232 L 575 232" class="dash" marker-end="url(#arrow)"/>
<path d="M 400 940 L 1060 940 L 1060 230 L 1090 230" class="dash" marker-end="url(#arrow)"/>
<rect x="70" y="115" width="350" height="210" class="box"/>
<rect x="70" y="115" width="350" height="38" class="header"/>
<text x="86" y="140" class="name">Person</text>
<text x="86" y="177" class="text">- id: QString</text>
<text x="86" y="199" class="text">- fullName: QString</text>
<line x1="78" y1="213" x2="412" y2="213" class="sep"/>
<text x="86" y="221" class="text">+ id()</text>
<text x="86" y="243" class="text">+ fullName()</text>
<text x="86" y="265" class="text">+ setFullName()</text>
<text x="86" y="287" class="text">+ toJson()</text>
<rect x="70" y="430" width="400" height="235" class="box"/>
<rect x="70" y="430" width="400" height="38" class="header"/>
<text x="86" y="455" class="name">Student</text>
<text x="86" y="492" class="text">- academicYear: int</text>
<text x="86" y="514" class="text">- dormitoryId: optional&lt;QString&gt;</text>
<text x="86" y="536" class="text">- roomNumber: optional&lt;int&gt;</text>
