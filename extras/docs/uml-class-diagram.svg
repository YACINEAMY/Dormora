<text x="86" y="558" class="text">+ isAssigned()</text>
<text x="86" y="580" class="text">+ assignToRoom()</text>
<text x="86" y="602" class="text">+ clearAssignment()</text>
<text x="86" y="624" class="text">+ fromJson()</text>
<rect x="575" y="115" width="400" height="235" class="box"/>
<rect x="575" y="115" width="400" height="38" class="header"/>
<text x="591" y="140" class="name">Room</text>
<text x="591" y="177" class="text">- number: int</text>
<text x="591" y="199" class="text">- capacity: int</text>
<text x="591" y="221" class="text">- studentIds: QSet&lt;QString&gt;</text>
<line x1="583" y1="235" x2="967" y2="235" class="sep"/>
<text x="591" y="243" class="text">+ occupancy()</text>
<text x="591" y="265" class="text">+ containsStudent()</text>
<text x="591" y="287" class="text">+ addStudent()</text>
<text x="591" y="309" class="text">+ removeStudent()</text>
<text x="591" y="331" class="text">+ isFull()</text>
<rect x="550" y="455" width="450" height="310" class="box"/>
<rect x="550" y="455" width="450" height="38" class="header"/>
<text x="566" y="480" class="name">Dormitory</text>
<text x="566" y="517" class="text">- id: QString</text>
<text x="566" y="539" class="text">- name: QString</text>
<text x="566" y="561" class="text">- capacity: int</text>
<text x="566" y="583" class="text">- rooms: QHash&lt;int, Room&gt;</text>
<text x="566" y="605" class="text">- restaurant: Restaurant</text>
<line x1="558" y1="619" x2="992" y2="619" class="sep"/>
<text x="566" y="627" class="text">+ addRoom()</text>
<text x="566" y="649" class="text">+ availableRooms()</text>
<text x="566" y="671" class="text">+ occupiedRooms()</text>
<text x="566" y="693" class="text">+ assignStudent()</text>
<text x="566" y="715" class="text">+ removeStudent()</text>
<rect x="520" y="875" width="530" height="300" class="box"/>
<rect x="520" y="875" width="530" height="38" class="header"/>
<text x="536" y="900" class="name">University</text>
<text x="536" y="937" class="text">- students: QHash&lt;QString, Student&gt;</text>
<text x="536" y="959" class="text">- dormitories: QHash&lt;QString, Dormitory&gt;</text>
<line x1="528" y1="973" x2="1042" y2="973" class="sep"/>
<text x="536" y="981" class="text">+ addStudent()</text>
<text x="536" y="1003" class="text">+ removeStudent()</text>
<text x="536" y="1025" class="text">+ addDormitory()</text>
<text x="536" y="1047" class="text">+ assignStudentToRoom()</text>
<text x="536" y="1069" class="text">+ setRestaurantMenu()</text>
<text x="536" y="1091" class="text">+ restaurantMenuForStudent()</text>
<text x="536" y="1113" class="text">+ validateIntegrity()</text>
<rect x="1090" y="115" width="420" height="230" class="box"/>
<rect x="1090" y="115" width="420" height="38" class="header"/>
<text x="1106" y="140" class="name">Restaurant</text>
<text x="1106" y="177" class="text">- name: QString</text>
<text x="1106" y="199" class="text">- menus: QMap&lt;QDate, DailyMenu&gt;</text>
<text x="1106" y="221" class="text">- mealsServed: QHash&lt;QDate, int&gt;</text>
<line x1="1098" y1="235" x2="1502" y2="235" class="sep"/>
<text x="1106" y="243" class="text">+ setMenu()</text>
<text x="1106" y="265" class="text">+ menuForDate()</text>
<text x="1106" y="287" class="text">+ recordMealServed()</text>
<text x="1106" y="309" class="text">+ mealsServedOn()</text>
<rect x="1110" y="455" width="400" height="230" class="box"/>
<rect x="1110" y="455" width="400" height="38" class="header"/>
<text x="1126" y="480" class="name">DailyMenu</text>
<text x="1126" y="517" class="text">+ breakfast: QString</text>
<text x="1126" y="539" class="text">+ lunch: QString</text>
<text x="1126" y="561" class="text">+ dinner: QString</text>
<text x="1126" y="583" class="text">+ breakfastImageUrl: QString</text>
<text x="1126" y="605" class="text">+ lunchImageUrl: QString</text>
<text x="1126" y="627" class="text">+ dinnerImageUrl: QString</text>
<line x1="1118" y1="641" x2="1502" y2="641" class="sep"/>
<text x="1126" y="649" class="text">+ toJson()</text>
<text x="1126" y="671" class="text">+ fromJson()</text>
<rect x="1170" y="845" width="340" height="135" class="box"/>
<rect x="1170" y="845" width="340" height="38" class="header"/>
<text x="1186" y="870" class="name">JsonStorage</text>
<text x="1186" y="907" class="text">+ saveUniversity()</text>
<text x="1186" y="929" class="text">+ loadUniversity(): University</text>
<rect x="1170" y="1060" width="340" height="135" class="box"/>
<rect x="1170" y="1060" width="340" height="38" class="header"/>
<text x="1186" y="1085" class="name">AppState</text>
<text x="1186" y="1122" class="text">+ neighborhoodToJson()</text>
<text x="1186" y="1144" class="text">+ adminProfileToJson()</text>
<text x="1186" y="1166" class="text">+ defaultAppStatePath()</text>
<rect x="70" y="875" width="330" height="130" class="box"/>
<rect x="70" y="875" width="330" height="38" class="header"/>
<text x="86" y="900" class="name">DomainError</text>
<text x="86" y="937" class="text">+ user-facing domain rule violation</text>
<line x1="78" y1="951" x2="392" y2="951" class="sep"/>
<text x="86" y="959" class="text">+ what()</text>
<rect x="60" y="1210" width="800" height="44" rx="8" fill="#f7faf8" stroke="#cbd8d2"/>
<text x="78" y="1238" class="note">Legend: filled diamond = composition, hollow diamond = aggregation, hollow triangle = inheritance, dashed arrow = dependency.</text>
</svg>